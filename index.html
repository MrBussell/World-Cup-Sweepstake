<!DOCTYPE html>
<html>
<head>
  <title>World Cup Sweepstake</title>

  <style>
    body { font-family: Arial; margin: 20px; }
    h1 { color: #1a73e8; }

    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid black; padding: 8px; text-align: left; }
    th { background-color: #333; color: white; }

    .in { background-color: #c8f7c5; }
    .out { background-color: #f7c5c5; }
    .winner { background-color: #ffe066; }

    button { margin-right: 5px; padding: 4px 8px; cursor: pointer; }
  </style>

  <script>
    function setStatus(rowId, status) {
      const row = document.getElementById(rowId);

      // Remove old classes
      row.classList.remove("in", "out", "winner");

      // Add new class
      if (status !== "") {
        row.classList.add(status);
      }

      // Save to localStorage
      localStorage.setItem(rowId, status);
    }

    function loadStatuses() {
      for (let i = 1; i <= 28; i++) {
        const rowId = "r" + i;
        const savedStatus = localStorage.getItem(rowId);

        if (savedStatus) {
          const row = document.getElementById(rowId);
          row.classList.add(savedStatus);
        }
      }
    }

    window.onload = loadStatuses;
  </script>
</head>

<body>

<h1>🏆 Form Sweepstake Tracker</h1>

<table>
<tr><th>No.</th><th>Team</th><th>Student</th><th>Update</th></tr>

<!-- Example row -->
<tr id="r1">
<td>1</td><td>Portugal</td><td>EA</td>
<td>
<button onclick="setStatus('r1','in')">IN</button>
<button onclick="setStatus('r1','out')">OUT</button>
<button onclick="setStatus('r1','winner')">WIN</button>
</td>
</tr>

<!-- Keep same pattern for all rows -->

<tr id="r2"><td>2</td><td>United States</td><td>OA</td>
<td><button onclick="setStatus('r2','in')">IN</button><button onclick="setStatus('r2','out')">OUT</button><button onclick="setStatus('r2','winner')">WIN</button></td></tr>

<tr id="r3"><td>3</td><td>Colombia</td><td>LBr</td>
